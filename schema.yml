components:
  schemas:
    Absence:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        dateDebut:
          type: string
          format: date
        dateFin:
          type: string
          format: date
        motif:
          type: string
        typeAbsence:
          $ref: '#/components/schemas/TypeAbsenceEnum'
        statut:
          allOf:
          - $ref: '#/components/schemas/AbsenceStatutEnum'
          readOnly: true
        user:
          type: integer
      required:
      - dateDebut
      - dateFin
      - id
      - motif
      - statut
      - user
    AbsenceStatutEnum:
      enum:
      - EN_ATTENTE
      - VALIDE
      - REJETE
      type: string
      description: |-
        * `EN_ATTENTE` - En attente
        * `VALIDE` - Validée
        * `REJETE` - Rejetée
    Horaire:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        heureDebut:
          type: string
          format: time
        heureFin:
          type: string
          format: time
        joursTravail: {}
      required:
      - heureDebut
      - heureFin
      - id
      - joursTravail
    PatchedAbsence:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        dateDebut:
          type: string
          format: date
        dateFin:
          type: string
          format: date
        motif:
          type: string
        typeAbsence:
          $ref: '#/components/schemas/TypeAbsenceEnum'
        statut:
          allOf:
          - $ref: '#/components/schemas/AbsenceStatutEnum'
          readOnly: true
        user:
          type: integer
    PatchedHoraire:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        heureDebut:
          type: string
          format: time
        heureFin:
          type: string
          format: time
        joursTravail: {}
    PatchedPointage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        heure_entree:
          type: string
          format: time
          nullable: true
        heure_sortie:
          type: string
          format: time
          nullable: true
        est_retard:
          type: boolean
        minutes_retard:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        heures_sup:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        employe:
          type: integer
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        password:
          type: string
          writeOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        nom:
          type: string
          maxLength: 100
        prenom:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        statut:
          $ref: '#/components/schemas/UserStatutEnum'
        is_active:
          type: boolean
        is_staff:
          type: boolean
        groups:
          type: array
          items:
            type: integer
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
        user_permissions:
          type: array
          items:
            type: integer
          description: Specific permissions for this user.
    Pointage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        heure_entree:
          type: string
          format: time
          nullable: true
        heure_sortie:
          type: string
          format: time
          nullable: true
        est_retard:
          type: boolean
        minutes_retard:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        heures_sup:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        employe:
          type: integer
      required:
      - date
      - employe
      - id
    RoleEnum:
      enum:
      - ADMIN
      - MANAGER
      - EMPLOYE
      type: string
      description: |-
        * `ADMIN` - Admin
        * `MANAGER` - Manager
        * `EMPLOYE` - Employe
    TokenObtainPair:
      type: object
      properties:
        email:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - email
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TypeAbsenceEnum:
      enum:
      - CONGE_ANNUEL
      - CONGE_MALADIE
      - CONGE_EXCEPTIONNEL
      - ABSENCE_NON_JUSTIFIEE
      type: string
      description: |-
        * `CONGE_ANNUEL` - Congé annuel
        * `CONGE_MALADIE` - Congé maladie
        * `CONGE_EXCEPTIONNEL` - Congé exceptionnel
        * `ABSENCE_NON_JUSTIFIEE` - Absence non justifiée
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        password:
          type: string
          writeOnly: true
        last_login:
          type: string
          format: date-time
          nullable: true
        is_superuser:
          type: boolean
          title: Superuser status
          description: Designates that this user has all permissions without explicitly
            assigning them.
        nom:
          type: string
          maxLength: 100
        prenom:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        statut:
          $ref: '#/components/schemas/UserStatutEnum'
        is_active:
          type: boolean
        is_staff:
          type: boolean
        groups:
          type: array
          items:
            type: integer
          description: The groups this user belongs to. A user will get all permissions
            granted to each of their groups.
        user_permissions:
          type: array
          items:
            type: integer
          description: Specific permissions for this user.
      required:
      - email
      - id
      - nom
      - password
      - prenom
      - role
    UserStatutEnum:
      enum:
      - ACTIF
      - INACTIF
      type: string
      description: |-
        * `ACTIF` - Actif
        * `INACTIF` - Inactif
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
